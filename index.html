<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>E-ink Image Converter · 1-bit / 2-bit / 7-color BMPs</title>
<style>
  /* ==== Design tokens ==================================================
     Dark-first; auto-light when the OS prefers it. Single accent (blue),
     three status colours, one rounded radius. Everything else is built
     out of these. */
  :root {
    color-scheme: dark light;
    --bg:           #0d0e12;
    --surface:      #15171f;
    --surface-2:    #1c1f2a;
    --surface-3:    #252836;
    --border:       #2a2e3d;
    --border-2:     #3b4054;
    --text:         #e3e7ee;
    --text-muted:   #8a91a3;
    --text-subtle:  #5e6477;
    --accent:       #6aa8ff;
    --accent-soft:  rgba(106, 168, 255, 0.18);
    --accent-text:  #ffffff;
    --ok:           #5cd9a2;
    --warn:         #ffb84d;
    --err:          #ff7373;
    --shadow:       0 1px 3px rgba(0, 0, 0, 0.4), 0 8px 24px rgba(0, 0, 0, 0.25);
    --radius:       6px;
    --radius-lg:    10px;
    --rail-w-l:     240px;
    --rail-w-r:     320px;
  }
  @media (prefers-color-scheme: light) {
    :root {
      --bg:          #f6f7f9;
      --surface:     #ffffff;
      --surface-2:   #f0f1f5;
      --surface-3:   #e6e8ee;
      --border:      #d8dae3;
      --border-2:    #b8bccd;
      --text:        #1a1d29;
      --text-muted:  #5a6072;
      --text-subtle: #8a91a3;
      --accent:      #2670e3;
      --accent-soft: rgba(38, 112, 227, 0.10);
      --shadow:      0 1px 3px rgba(0, 0, 0, 0.06), 0 4px 14px rgba(0, 0, 0, 0.06);
    }
  }

  /* ==== Reset ========================================================== */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; }
  body {
    background: var(--bg);
    color: var(--text);
    font: 15px/1.45 system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    display: grid;
    grid-template-rows: auto 1fr;
    /* minmax(0, 1fr) so the implicit column doesn't auto-expand to fit a
       wide grid item (appbar's long preset select, or the 800px canvas).
       Without this, body.scrollWidth exceeds the viewport on phones. */
    grid-template-columns: minmax(0, 1fr);
  }
  .hint { color: var(--text-muted); font-size: 0.85em; }

  /* ==== App bar ======================================================== */
  .appbar {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 0.6em 1em;
    padding: 0.5em 1em;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }
  .appbar-controls {
    display: flex; flex-wrap: wrap; align-items: center;
    gap: 0.4em 0.9em;
  }
  .appbar-actions {
    display: flex; align-items: center; gap: 0.4em;
    margin-left: auto;
  }
  /* Inline label "Size" before the size <select> */
  .appbar-label {
    display: inline-flex; align-items: center; gap: 0.4em;
    color: var(--text-muted);
    font-size: 0.9em;
  }
  .appbar select { max-width: 280px; }

  /* ==== Popover (preset menu) ========================================= */
  .popover-wrap { position: relative; display: inline-block; }
  .popover-trigger {
    display: inline-flex; align-items: center; gap: 0.4em;
    padding: 0.4em 0.8em;
  }
  .popover-trigger .caret { color: var(--text-muted); font-size: 0.8em; }
  .popover-menu {
    position: absolute;
    top: calc(100% + 6px); left: 0;
    z-index: 100;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 0.3em;
    display: flex; flex-direction: column;
    gap: 0.2em;
    min-width: 240px;
  }
  .popover-menu.hidden { display: none; }
  .preset-item {
    background: transparent;
    border: 0;
    border-radius: var(--radius);
    padding: 0.55em 0.8em;
    text-align: left;
    cursor: pointer;
    display: flex; flex-direction: column; gap: 0.05em;
    font: inherit; color: inherit;
    width: 100%;
  }
  .preset-item:hover { background: var(--surface-3); }
  .preset-item strong { font-size: 0.95em; font-weight: 600; }
  .preset-item span { font-size: 0.78em; color: var(--text-muted); font-family: ui-monospace, monospace; }

  /* ==== Buttons ======================================================== */
  button {
    background: var(--surface-2);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 0.4em 0.8em;
    font: inherit;
    cursor: pointer;
    transition: background 0.1s, border-color 0.1s, color 0.1s;
  }
  button:hover:not(:disabled) { background: var(--surface-3); border-color: var(--border-2); }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  button.primary {
    background: var(--accent);
    color: var(--accent-text);
    border-color: var(--accent);
    font-weight: 500;
  }
  button.primary:hover:not(:disabled) { filter: brightness(1.08); }
  button.iconbtn {
    padding: 0.3em 0.55em;
    font-size: 1em;
    color: var(--text-muted);
  }
  button.iconbtn:hover:not(:disabled) { color: var(--text); }

  /* ==== Workspace (3-col grid) ========================================= */
  .workspace {
    display: grid;
    grid-template-columns: var(--rail-w-l) minmax(0, 1fr) var(--rail-w-r);
    min-height: 0;
  }

  /* ==== Rails ========================================================== */
  .rail {
    background: var(--surface);
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    min-height: 0;
  }
  .rail-left  { border-right: 1px solid var(--border); }
  .rail-right { border-left:  1px solid var(--border); }

  .rail-section { padding: 0.9em; }
  .rail-head {
    display: flex; justify-content: space-between; align-items: baseline;
    margin-bottom: 0.7em;
  }
  .rail-head h2 {
    font-size: 0.7em; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.12em;
    color: var(--text-muted);
    margin: 0;
  }

  /* ==== Right-rail single-scroll inspector ============================= */
  .rail-content { padding: 1em 0.9em 1.4em; }
  .rail-group + .rail-group {
    margin-top: 1.4em;
    padding-top: 1.4em;
    border-top: 1px solid var(--border);
  }
  .group-title {
    font-size: 0.78em; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.12em;
    color: var(--text);
    margin: 0 0 0.8em;
  }
  .rail-content h3 {
    font-size: 0.75em; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.12em;
    color: var(--text-muted);
    margin: 1.4em 0 0.6em;
  }
  .rail-content .rail-group > h3:first-of-type,
  .rail-content .rail-group .group-title + h3 { margin-top: 0; }

  .empty-state {
    padding: 1.4em 1em; text-align: center;
    color: var(--text-subtle); font-size: 0.92em;
    background: var(--surface-2);
    border-radius: var(--radius);
  }

  /* ==== Form controls ================================================== */
  label { font-size: 0.9em; }
  .rail-content label { display: block; margin: 0.5em 0; color: var(--text); }

  /* range row: [name] [slider] [number] [unit] */
  label.range {
    display: grid;
    grid-template-columns: 5.5em 1fr auto auto;
    gap: 0.5em;
    align-items: center;
  }
  label.range > span:first-child { color: var(--text-muted); }
  label.range .unit { color: var(--text-subtle); font-size: 0.85em; }

  /* select row: [name] [select] */
  label.select-label {
    display: grid;
    grid-template-columns: 5.5em 1fr;
    gap: 0.5em;
    align-items: center;
  }
  label.select-label > span:first-child { color: var(--text-muted); }

  select, input[type="number"], input[type="text"] {
    background: var(--surface-2);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 0.35em 0.5em;
    font: inherit;
  }
  /* Inside the right rail, form controls fill their grid cell. */
  .rail-content select,
  .rail-content input[type="number"],
  .rail-content input[type="text"] { width: 100%; }
  select:focus, input[type="number"]:focus, input[type="text"]:focus {
    outline: 0;
    border-color: var(--accent);
    box-shadow: 0 0 0 2px var(--accent-soft);
  }
  input[type="number"].value {
    width: 5em;
    text-align: right;
    font-family: ui-monospace, Menlo, monospace;
  }

  /* Range slider */
  input[type="range"] {
    -webkit-appearance: none; appearance: none;
    width: 100%; height: 4px;
    background: var(--surface-3);
    border-radius: 2px; outline: none;
    cursor: pointer;
    /* Claim the horizontal gesture so mobile browsers don't hijack thumb
       drags for page-pan when there's any horizontal overflow on the page. */
    touch-action: pan-y;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 24px; height: 24px;
    background: var(--accent);
    border-radius: 50%;
    cursor: pointer;
    transition: transform 0.1s;
  }
  input[type="range"]::-moz-range-thumb {
    width: 24px; height: 24px;
    background: var(--accent);
    border-radius: 50%; border: 0;
    cursor: pointer;
  }
  input[type="range"]:hover::-webkit-slider-thumb { transform: scale(1.08); }

  /* Switch — restyles the inline checkboxes inside label.switch */
  label.switch {
    display: flex !important;
    align-items: center;
    gap: 0.6em;
    cursor: pointer;
  }
  label.switch input[type="checkbox"] {
    -webkit-appearance: none; appearance: none;
    position: relative; flex-shrink: 0;
    width: 32px; height: 18px;
    background: var(--surface-3);
    border-radius: 9px;
    cursor: pointer;
    transition: background 0.15s;
    margin: 0;
  }
  label.switch input[type="checkbox"]::after {
    content: '';
    position: absolute;
    top: 2px; left: 2px;
    width: 14px; height: 14px;
    background: var(--text-muted);
    border-radius: 50%;
    transition: left 0.15s, background 0.15s;
  }
  label.switch input[type="checkbox"]:checked { background: var(--accent-soft); }
  label.switch input[type="checkbox"]:checked::after { left: 16px; background: var(--accent); }

  /* Inline button rows */
  .row-actions {
    display: flex; gap: 0.4em; flex-wrap: wrap;
    margin-top: 0.6em;
  }
  .row-actions.sticky-bottom {
    margin-top: 1.4em;
    padding-top: 0.9em;
    border-top: 1px solid var(--border);
  }
  .row-actions button { flex: 1; min-width: 90px; }

  /* ==== Layers panel =================================================== */
  .dropzone {
    display: block;
    border: 1.5px dashed var(--border-2);
    border-radius: var(--radius);
    padding: 1.1em 0.6em;
    text-align: center;
    margin-bottom: 0.8em;
    color: var(--text-muted);
    cursor: pointer;
    transition: border-color 0.1s, background 0.1s, color 0.1s;
  }
  .dropzone:hover { border-color: var(--accent); color: var(--text); }
  .dropzone.over  { border-color: var(--accent); background: var(--accent-soft); color: var(--text); }
  .dropzone strong { display: block; font-size: 0.9em; }
  .dropzone span { display: block; font-size: 0.75em; margin-top: 0.2em; color: var(--text-subtle); }
  /* Default: show desktop copy, hide mobile copy.
     `@media (pointer: coarse)` flips this for touch devices. */
  .dropzone .mobile-copy { display: none; }

  #layers { display: flex; flex-direction: column; gap: 0.3em; }
  #layers .empty {
    padding: 1.2em 0.5em;
    text-align: center;
    color: var(--text-subtle);
    font-style: italic;
    font-size: 0.85em;
  }
  .layer {
    display: grid;
    grid-template-columns: 12px 40px 1fr auto;
    gap: 0.5em;
    align-items: center;
    padding: 0.35em 0.5em;
    border-radius: var(--radius);
    background: var(--surface-2);
    border: 1px solid transparent;
    cursor: grab;
    user-select: none;
  }
  .layer:hover { background: var(--surface-3); }
  .layer.selected {
    background: var(--accent-soft);
    border-color: var(--accent);
  }
  .layer.dragging { opacity: 0.4; cursor: grabbing; }
  .layer.drop-target { box-shadow: inset 0 2px 0 var(--accent); }
  .layer .grip {
    color: var(--text-subtle);
    font-size: 0.85em;
    line-height: 1;
    cursor: grab;
  }
  .layer canvas {
    width: 40px; height: 28px;
    background: white;
    border-radius: 3px;
    image-rendering: pixelated;
  }
  .layer .name {
    font-size: 0.85em;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .layer .actions { display: flex; gap: 0.05em; }
  .layer .actions button {
    padding: 0.15em 0.4em;
    font-size: 0.85em;
    background: transparent; border: 0;
    color: var(--text-muted);
    border-radius: 3px;
    line-height: 1;
  }
  .layer .actions button:hover { background: var(--surface); color: var(--text); }

  /* ==== Canvas area ==================================================== */
  .canvas-area {
    display: flex; flex-direction: column;
    background: var(--bg);
    min-width: 0;
  }
  .canvas-wrap {
    flex: 1;
    display: grid; place-items: center;
    padding: 1.4em;
    overflow: auto;
    min-height: 0;
  }
  canvas#preview {
    background: #fff;
    max-width: 100%;
    max-height: 100%;
    image-rendering: pixelated;
    box-shadow: var(--shadow);
    border-radius: 2px;
    /* Stop the browser from intercepting touch as scroll/pinch — we handle it. */
    touch-action: none;
    -webkit-user-select: none;
    user-select: none;
  }
  canvas#preview.pan { cursor: grab; }
  canvas#preview.panning { cursor: grabbing; }

  .statusbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 1em;
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 0.45em 1em;
    font-family: ui-monospace, Menlo, monospace;
    font-size: 0.8em;
    color: var(--text-muted);
  }
  .statusbar-trailing { display: inline-flex; align-items: center; gap: 0.6em; }
  .statusbar .shortcut-hints { font-family: system-ui, sans-serif; }
  /* Peek button — slim, status-bar-fitted */
  #peekBtn { padding: 0.2em 0.6em; font-size: 0.85em; }
  #status.ok    { color: var(--ok); }
  #status.warn  { color: var(--warn); }
  #status.err   { color: var(--err); }

  /* ==== Misc =========================================================== */
  .hidden { display: none !important; }

  /* Background-removal swatch */
  #bgSwatch {
    display: inline-block !important;
    width: 22px; height: 22px;
    border: 1px solid var(--border-2);
    border-radius: 4px;
    vertical-align: middle;
  }
  /* Palette swatches (next to 7-color toggle) */
  .palette-swatches { display: inline-flex; gap: 2px; vertical-align: middle; margin-left: 0.4em; }
  .palette-swatches span {
    display: inline-block; width: 12px; height: 12px;
    border: 1px solid var(--border-2);
    border-radius: 2px;
  }

  /* Responsive: tighten rails between 900–1100px, then stack vertically. */
  @media (max-width: 1100px) {
    .workspace { grid-template-columns: 220px minmax(0, 1fr) 290px; }
    :root { --rail-w-l: 220px; --rail-w-r: 290px; }
  }
  @media (max-width: 900px) {
    /* On mobile we drop the desktop "lock everything to viewport" model and
       let the document scroll naturally. The desktop rule sets html+body to
       overflow:hidden / height:100%, which on a stacked layout taller than
       the viewport leaves the page un-scrollable on iOS Safari. */
    html, body { height: auto; overflow: visible; }
    .workspace {
      grid-template-columns: minmax(0, 1fr);
      grid-template-rows: auto auto auto;
    }
    /* Rails are full-content-height in the stacked layout, so the desktop
       overflow-y:auto would only create a scroll-trap that swallows
       vertical swipes inside the right rail (image settings) on iOS. */
    .rail { max-height: none; overflow: visible; border-right: 0 !important; border-left: 0 !important; border-bottom: 1px solid var(--border); }
    .canvas-wrap { overflow: visible; }

    /* Tighter app bar */
    .appbar { padding: 0.5em 0.6em; }
    /* Let the size select shrink to fit narrow viewports — the desktop cap
       (280px) and the default min-content of long preset names both push
       the appbar past the viewport on phones. The label is the flex item
       in .appbar-controls; its default min-width:auto pins it to content,
       so we override that and stretch it across its wrapped row, then let
       the inner select fill it. */
    .appbar-label { min-width: 0; flex: 1 1 auto; }
    .appbar-label select { width: 100%; max-width: 100%; min-width: 0; }
    .popover-menu { min-width: min(240px, calc(100vw - 2em)); }

    /* Canvas: keep it visible without collapsing too small in the stack.
       max-width on the canvas itself keeps the 800px bitmap from forcing
       its parents wider than the viewport (which would push the Peek
       button off-screen and let mobile browsers hijack slider drags as
       horizontal page-pan). */
    .canvas-area .canvas-wrap { padding: 0.4em; min-height: 50vh; }
    /* Use canvas#preview to outrank the desktop canvas#preview rule's
       touch-action:none — that rule blocks vertical page scroll whenever
       the finger lands on the canvas (the largest element on the mobile
       stack), which is what's keeping users from reaching the layers
       above and the settings below. pan-y lets the page scroll vertically
       while horizontal moves still reach the pointer handler so layer
       dragging continues to work. */
    canvas#preview {
      max-width: 100%; height: auto;
      touch-action: pan-y;
    }

    /* Hide hints that don't apply to touch (no keyboard, no drag-reorder) */
    .statusbar .shortcut-hints { display: none; }
    .rail-head .hint { display: none; }
  }

  /* Modality-based: anything tied to actual touch input, not viewport size.
     Catches phones, tablets, and touch laptops correctly. */
  @media (pointer: coarse) {
    /* Per-layer ↑/↓/× buttons are the primary mobile reorder UI — make them
       finger-sized rather than the desktop dense layout. */
    .layer .actions button { padding: 0.5em 0.7em; font-size: 1em; }
    /* Dropzone copy swap (HTML carries both spans). */
    .dropzone .desktop-copy { display: none; }
    .dropzone .mobile-copy  { display: block; }
  }
</style>
</head>
<body>

<header class="appbar">
  <div class="appbar-controls">
    <!-- Preset popover — applies a full settings stack in one go. -->
    <div class="popover-wrap">
      <button id="presetBtn" class="popover-trigger" type="button" aria-haspopup="true" aria-expanded="false"
              title="Apply a preset — replaces display, dither, tone & colour settings.">
        Apply preset <span class="caret">▾</span>
      </button>
      <div id="presetMenu" class="popover-menu hidden" role="menu" aria-label="Presets"></div>
    </div>

    <!-- Display size -->
    <label class="appbar-label">
      <span>Size</span>
      <select id="displayPreset"></select>
    </label>

    <!-- Portrait -->
    <label class="switch">
      <input type="checkbox" id="portrait">
      <span>Portrait</span>
    </label>

    <!-- Output mode -->
    <label class="appbar-label">
      <span>Output</span>
      <select id="outputMode" title="Pick the bit-depth and palette your target panel expects.">
        <option value="1bit">1-bit B&amp;W</option>
        <option value="4gray">4-gray</option>
        <option value="2bit-bw-red">B+W+Red</option>
        <option value="2bit-bw-yellow">B+W+Yellow</option>
        <option value="7color">7-color</option>
      </select>
    </label>
    <span class="palette-swatches" id="paletteSwatches"></span>
  </div>

  <div class="appbar-actions">
    <button id="undoBtn" class="iconbtn" title="Undo (Ctrl/Cmd-Z)" disabled>↶</button>
    <button id="redoBtn" class="iconbtn" title="Redo (Ctrl/Cmd-Shift-Z)" disabled>↷</button>
    <button id="download" class="primary" disabled>Export .bmp</button>
  </div>
</header>

<main class="workspace">

  <!-- LEFT RAIL: Layers -->
  <aside class="rail rail-left">
    <div class="rail-section">
      <div class="rail-head">
        <h2>Layers</h2>
        <span class="hint">drag to reorder</span>
      </div>
      <label id="drop" class="dropzone">
        <input type="file" id="file" accept="image/*" multiple hidden>
        <strong>+ Add images</strong>
        <span class="desktop-copy">Drop, paste, or click — pick multiple at once</span>
        <span class="mobile-copy">Tap to choose images</span>
      </label>
      <div id="layers"><div class="empty">No layers yet</div></div>
    </div>
  </aside>

  <!-- CENTER: Preview -->
  <section class="canvas-area">
    <div class="canvas-wrap">
      <canvas id="preview" width="800" height="480"></canvas>
    </div>
    <div class="statusbar">
      <span id="status" class="status">Waiting for images…</span>
      <span class="statusbar-trailing">
        <button id="peekBtn" type="button" class="iconbtn" title="Hold to compare un-dithered (Space)">Peek</button>
        <span class="hint shortcut-hints">Space peek · R rotate · Del remove · Ctrl-Z undo</span>
      </span>
    </div>
  </section>

  <!-- RIGHT RAIL: Inspector (single scroll, no tabs) -->
  <aside class="rail rail-right">
    <div class="rail-content">

      <!-- ---------- LAYER ---------- -->
      <div class="rail-group">
        <h2 class="group-title">Layer</h2>

        <div id="layerEmpty" class="empty-state">
          Select a layer in the list to edit it.
        </div>

        <div id="selHead" class="hidden"><h3>Transform</h3></div>
        <div class="section hidden" id="selControls">
          <label class="range">
            <span>Scale</span>
            <input type="range" id="scale" min="1" max="500" value="100">
            <input type="number" class="value" id="scaleVal" min="1" max="500" value="100">
            <span class="unit">%</span>
          </label>
        </div>
        <div class="section hidden" id="selControlsRot">
          <label class="range">
            <span>Rotation</span>
            <input type="range" id="rotation" min="-180" max="180" value="0" step="1">
            <input type="number" class="value" id="rotationVal" min="-180" max="180" value="0">
            <span class="unit">°</span>
          </label>
          <div class="row-actions">
            <button id="rotate90" title="Rotate 90° clockwise (R)">⟳ 90°</button>
            <button id="rotateReset" title="Reset rotation to 0°">Reset</button>
          </div>
        </div>
        <div class="section hidden" id="selControls2">
          <div class="row-actions">

              <option value="stucki">Stucki</option>

              <option value="sierraLite">Sierra Lite</option>
            </optgroup>
            <optgroup label="Ordered">
              <option value="bayer4">Bayer 4×4</option>
              <option value="bayer8">Bayer 8×8</option>
              <option value="blueNoise">Blue noise (IGN)</option>

        <label class="switch" title="Use OkLab (perceptually uniform) instead of RGB when picking the nearest palette colour. Big quality win on skin tones, foliage, skies.">
          <input type="checkbox" id="perceptual" checked>
          <span>Perceptual palette (OkLab)</span>
        </label>
        <label class="switch" title="Error-diffuse in linear-light space so dithered gradients stop looking washed-out. Slower but more accurate.">
          <input type="checkbox" id="gamma">
          <span>Gamma-correct diffusion</span>
