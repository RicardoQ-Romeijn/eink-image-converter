        <div class="row-actions sticky-bottom">
          <button id="resetGlobals" title="Reset tone & dither to defaults (keeps your display + profile choice).">Reset settings</button>
          <button id="clearAll" title="Remove every layer.">Clear layers</button>
        </div>
      </div>

    </div>
  </aside>

</main>

<script>
(() => {
  // Current working resolution (mutated when the display preset or portrait
  // toggle change).
  let W = 800, H = 480;

  // Terminus (TRMNL) 1-bit BMP has fixed size at 800×480.
  const TRMNL_W = 800, TRMNL_H = 480;
  const TRMNL_BMP_SIZE = 48062;

  // Common Waveshare / TRMNL-ish e-paper sizes, given in landscape
  // orientation. Portrait toggle just swaps W/H.
  const DISPLAYS = [
    { name: '7.5" / 7.3" 7-color / 4.26" — 800 × 480 (TRMNL, PhotoPainter)', w: 800, h: 480 },
    { name: '7.5" HD — 880 × 528',                 w: 880,  h: 528  },
    { name: '6" HD — 800 × 600',                   w: 800,  h: 600  },
    { name: '5.83" — 648 × 480',                   w: 648,  h: 480  },
    { name: '5.65" 7-color — 600 × 448',           w: 600,  h: 448  },
    { name: '4.2" — 400 × 300',                    w: 400,  h: 300  },
    { name: '4.01" 7-color — 640 × 400',           w: 640,  h: 400  },
    { name: '2.9" — 296 × 128',                    w: 296,  h: 128  },
    { name: '2.7" — 264 × 176',                    w: 264,  h: 176  },
    { name: '2.13" — 250 × 122',                   w: 250,  h: 122  },
    { name: '1.54" — 200 × 200',                   w: 200,  h: 200  },
    { name: '9.7" — 1200 × 825',                   w: 1200, h: 825  },
    { name: '10.3" — 1872 × 1404',                 w: 1872, h: 1404 },
    { name: '13.3" Spectra 6 — 1600 × 1200',       w: 1600, h: 1200 },
  ];

  // Standard 7-color e-paper palette (Waveshare / PhotoPainter). Verified
  // against waveshareteam/PhotoPainter convert.py output.
  const PALETTE_7 = [
    { r: 0,   g: 0,   b: 0   },
    { r: 255, g: 255, b: 255 },
    { r: 255, g: 0,   b: 0   },
    { r: 0,   g: 255, b: 0   },
    { r: 0,   g: 0,   b: 255 },
    { r: 255, g: 255, b: 0   },
    { r: 255, g: 128, b: 0   },
  ];

  // Smaller palettes for the 2-bit modes (encoded as 4-bit BMP, see
  // buildBmp4). Order matters — index 0 is what unused / clean pixels become.
  const PALETTE_1BIT = [
    { r: 0,   g: 0,   b: 0   },
    { r: 255, g: 255, b: 255 },
  ];
  const PALETTE_4GRAY = [
    { r: 0,   g: 0,   b: 0   },
    { r: 85,  g: 85,  b: 85  },
    { r: 170, g: 170, b: 170 },
    { r: 255, g: 255, b: 255 },
  ];
  const PALETTE_BW_RED = [
    { r: 0,   g: 0,   b: 0   },
    { r: 255, g: 255, b: 255 },
    { r: 255, g: 0,   b: 0   },
  ];
  const PALETTE_BW_YELLOW = [
    { r: 0,   g: 0,   b: 0   },
    { r: 255, g: 255, b: 255 },
    { r: 255, g: 255, b: 0   },
  ];

  // Lookup-table for the Output dropdown. `chromatic` controls whether the
  // saturation slider is meaningful; `encoder` picks the BMP path.
  const OUTPUT_MODES = {
    '1bit':           { name: '1-bit B&W',    palette: PALETTE_1BIT,      encoder: 'bmp1',  chromatic: false },
    '4gray':          { name: '4-gray',       palette: PALETTE_4GRAY,     encoder: 'bmp4',  chromatic: false },
    '2bit-bw-red':    { name: 'B+W+Red',      palette: PALETTE_BW_RED,    encoder: 'bmp4',  chromatic: true  },
    '2bit-bw-yellow': { name: 'B+W+Yellow',   palette: PALETTE_BW_YELLOW, encoder: 'bmp4',  chromatic: true  },
    '7color':         { name: '7-color',      palette: PALETTE_7,         encoder: 'bmp24', chromatic: true  },
  };

  // ----- Error-diffusion kernels. Offsets are [dx, dy, weight]; forward-only
  // so a single scanline pass fills in downstream pixels without revisiting.
  const KERNELS = {
    fs: { denom: 16, offsets: [
      [1, 0, 7],
      [-1, 1, 3], [0, 1, 5], [1, 1, 1],
    ] },
    atkinson: { denom: 8, offsets: [
      [1, 0, 1], [2, 0, 1],
      [-1, 1, 1], [0, 1, 1], [1, 1, 1],
      [0, 2, 1],
    ] },
    jjn: { denom: 48, offsets: [
      [1, 0, 7], [2, 0, 5],
      [-2, 1, 3], [-1, 1, 5], [0, 1, 7], [1, 1, 5], [2, 1, 3],
      [-2, 2, 1], [-1, 2, 3], [0, 2, 5], [1, 2, 3], [2, 2, 1],
    ] },
    stucki: { denom: 42, offsets: [
      [1, 0, 8], [2, 0, 4],
      [-2, 1, 2], [-1, 1, 4], [0, 1, 8], [1, 1, 4], [2, 1, 2],
      [-2, 2, 1], [-1, 2, 2], [0, 2, 4], [1, 2, 2], [2, 2, 1],
    ] },
    burkes: { denom: 32, offsets: [
      [1, 0, 8], [2, 0, 4],
      [-2, 1, 2], [-1, 1, 4], [0, 1, 8], [1, 1, 4], [2, 1, 2],
    ] },
    sierra: { denom: 32, offsets: [
      [1, 0, 5], [2, 0, 3],
      [-2, 1, 2], [-1, 1, 4], [0, 1, 5], [1, 1, 4], [2, 1, 2],
      [-1, 2, 2], [0, 2, 3], [1, 2, 2],
    ] },
    sierraLite: { denom: 4, offsets: [
      [1, 0, 2],
      [-1, 1, 1], [0, 1, 1],
    ] },
  };
  const ERROR_DIFFUSION_KEYS = new Set(Object.keys(KERNELS));

  const BAYER4 = [
    [  0, 128,  32, 160],
    [192,  64, 224,  96],
    [ 48, 176,  16, 144],
    [240, 112, 208,  80],
  ];
  const BAYER8 = (() => {
    const raw = [
      [ 0, 32,  8, 40,  2, 34, 10, 42],
      [48, 16, 56, 24, 50, 18, 58, 26],
      [12, 44,  4, 36, 14, 46,  6, 38],
      [60, 28, 52, 20, 62, 30, 54, 22],
      [ 3, 35, 11, 43,  1, 33,  9, 41],
      [51, 19, 59, 27, 49, 17, 57, 25],
      [15, 47,  7, 39, 13, 45,  5, 37],
      [63, 31, 55, 23, 61, 29, 53, 21],
    ];
    return raw.map(row => row.map(v => (v + 0.5) / 64 * 255));
  })();

  function ign(x, y) {
    const v = 52.9829189 * ((0.06711056 * x + 0.00583715 * y) % 1);
    return v - Math.floor(v);
  }

  const SRGB_TO_LIN = new Float32Array(256);
  for (let i = 0; i < 256; i++) {
    const c = i / 255;
    const l = c <= 0.04045 ? c / 12.92 : Math.pow((c + 0.055) / 1.055, 2.4);
    SRGB_TO_LIN[i] = l * 255;
  }

  function rgbLinearToOklab(lr, lg, lb) {
    lr /= 255; lg /= 255; lb /= 255;
    const l = 0.4122214708 * lr + 0.5363325363 * lg + 0.0514459929 * lb;
    const m = 0.2119034982 * lr + 0.6806995451 * lg + 0.1073969566 * lb;
    const s = 0.0883024619 * lr + 0.2817188376 * lg + 0.6299787005 * lb;
    const l_ = Math.cbrt(l), m_ = Math.cbrt(m), s_ = Math.cbrt(s);
    return [
      0.2104542553 * l_ + 0.7936177850 * m_ - 0.0040720468 * s_,
      1.9779984951 * l_ - 2.4285922050 * m_ + 0.4505937099 * s_,
      0.0259040371 * l_ + 0.7827717662 * m_ - 0.8086757660 * s_,
    ];
  }

  const PALETTE_LIN = PALETTE_7.map(p => ({
    r: SRGB_TO_LIN[p.r], g: SRGB_TO_LIN[p.g], b: SRGB_TO_LIN[p.b],
  }));
  const PALETTE_LAB = PALETTE_LIN.map(p => rgbLinearToOklab(p.r, p.g, p.b));

  // ----- Per-layer data
  let layers = [];
  let nextId = 1;
  let selectedId = null;
  let pickMode = false;

  const GLOBAL_DEFAULTS = {
    background: 'white',
    brightness: 0,
    contrast: 0,
    saturation: 100,
    invert: false,
    dither: 'fs',
    fsStrength: 100,
    threshold: 128,
    outputMode: '1bit',         // '1bit' | '4gray' | '2bit-bw-red' | '2bit-bw-yellow' | '7color'
    perceptual: true,
    gamma: false,
    displayIndex: 0,
    portrait: false,
  };
  const globals = { ...GLOBAL_DEFAULTS };

  // ----- Persistence
  const LS_KEY = 'bmp_merge_settings_v1';
  let _saveTimer = null;
  function loadSettings() {
    try {
      const raw = localStorage.getItem(LS_KEY);
      if (!raw) return;
      const data = JSON.parse(raw);
      for (const k of Object.keys(GLOBAL_DEFAULTS)) {
        if (k in data) globals[k] = data[k];
      }
      // Migration: legacy schema used a boolean `sevenColor`. Map it forward
      // so existing users keep their previous mode after this update.
      if (!('outputMode' in data) && 'sevenColor' in data) {
        globals.outputMode = data.sevenColor ? '7color' : '1bit';
      }
      // Defensive: if outputMode is unknown (e.g. future version was loaded
      // and rolled back), fall back to 1-bit instead of crashing render().
      if (!OUTPUT_MODES[globals.outputMode]) globals.outputMode = '1bit';
    } catch (_) { /* corrupt JSON → ignore, defaults stand */ }
  }
  function saveSettings() {
    if (_saveTimer) clearTimeout(_saveTimer);
    _saveTimer = setTimeout(() => {
      try {
        const out = {};
        for (const k of Object.keys(GLOBAL_DEFAULTS)) out[k] = globals[k];
        localStorage.setItem(LS_KEY, JSON.stringify(out));
      } catch (_) { /* quota / disabled — silent */ }
    }, 200);
  }

  // ----- Quick-start device profiles
  function _findDisplayIndex(w, h) {
    return DISPLAYS.findIndex(d => d.w === w && d.h === h);
  }
  const PROFILES = [
    {
      name: 'TRMNL B&W',
      sub: '800×480 · 1-bit',
      apply: () => Object.assign(globals, {
        outputMode: '1bit', dither: 'fs', fsStrength: 100,
        gamma: false, background: 'white', invert: false, saturation: 100,
        displayIndex: Math.max(0, _findDisplayIndex(800, 480)), portrait: false,
      }),
    },
    {
      name: 'Waveshare 7.5" B+W+Red',
      sub: '800×480 · 4-bit indexed',
      apply: () => Object.assign(globals, {
        outputMode: '2bit-bw-red', perceptual: true, gamma: true,
        dither: 'fs', fsStrength: 100, saturation: 160,
        background: 'white', invert: false,
        displayIndex: Math.max(0, _findDisplayIndex(800, 480)), portrait: false,
      }),
    },
    {
      name: 'PhotoPainter 7-color',
      sub: '800×480 · 24-bit',
      apply: () => Object.assign(globals, {
        outputMode: '7color', perceptual: true, gamma: true,
        dither: 'fs', fsStrength: 100, saturation: 180,
        background: 'white', invert: false,
        displayIndex: Math.max(0, _findDisplayIndex(800, 480)), portrait: false,
      }),
    },
    {
      name: 'Waveshare 5.65" 7-color',
      sub: '600×448 · 24-bit',
      apply: () => Object.assign(globals, {
        outputMode: '7color', perceptual: true, gamma: true,
        dither: 'fs', fsStrength: 100, saturation: 180,
        background: 'white', invert: false,
        displayIndex: Math.max(0, _findDisplayIndex(600, 448)), portrait: false,
      }),
    },
  ];

  // ----- Layer-level undo/redo
  const HISTORY_LIMIT = 50;
  let historyStack = [];
  let redoStack = [];
  function snapshot() {
    return {
      layers: layers.map(l => ({
        id: l.id,
        name: l.name,
        x: l.x, y: l.y,
        scale: l.scale,
        rotation: l.rotation,
        image: l.image,
        bg: {
          enabled:   l.bg.enabled,
          color:     l.bg.color ? { ...l.bg.color } : null,
          tolerance: l.bg.tolerance,
          feather:   l.bg.feather,
        },
        _processedCanvas: null,
        _processedKey: '',
      })),
      selectedId,
    };
  }
  function pushHistory() {
    historyStack.push(snapshot());
    if (historyStack.length > HISTORY_LIMIT) historyStack.shift();
    redoStack.length = 0;
    syncHistoryButtons();
  }
  function applySnapshot(snap) {
    layers = snap.layers.map(l => ({ ...l, bg: { ...l.bg, color: l.bg.color ? { ...l.bg.color } : null } }));
    selectedId = snap.selectedId;
    rebuildLayerList();
    updateSelectedUI();
    scheduleRender();
  }
  function undo() {
    if (historyStack.length === 0) return;
    redoStack.push(snapshot());
    applySnapshot(historyStack.pop());
    syncHistoryButtons();
  }
  function redo() {
    if (redoStack.length === 0) return;
    historyStack.push(snapshot());
    applySnapshot(redoStack.pop());
    syncHistoryButtons();
  }
  function syncHistoryButtons() {
    const u = $('undoBtn'), r = $('redoBtn');
    if (u) u.disabled = historyStack.length === 0;
    if (r) r.disabled = redoStack.length === 0;
  }

  // ----- Before/after peek
  let peekMode = false;

  let bmpBlob = null;
  let renderPending = false;

  const canvas = document.getElementById('preview');
  const ctx = canvas.getContext('2d', { willReadFrequently: true });
  const offCanvas = document.createElement('canvas');
  offCanvas.width = W; offCanvas.height = H;
  const offCtx = offCanvas.getContext('2d', { willReadFrequently: true });

  const $ = id => document.getElementById(id);

  // Populate display preset dropdown
  const displaySelect = $('displayPreset');
  DISPLAYS.forEach((d, i) => {
    const opt = document.createElement('option');
    opt.value = i;
    opt.textContent = d.name;
    displaySelect.appendChild(opt);
  });

  // Render palette swatches next to the Output dropdown — re-rendered every
  // time the mode changes so the user sees exactly which colours will land
  // in the BMP.
  const swatchHost = $('paletteSwatches');
  function refreshPaletteSwatches() {
    const mode = OUTPUT_MODES[globals.outputMode] || OUTPUT_MODES['1bit'];
    swatchHost.innerHTML = '';
    for (const p of mode.palette) {
      const s = document.createElement('span');
      s.style.background = `rgb(${p.r}, ${p.g}, ${p.b})`;
      s.title = `rgb(${p.r}, ${p.g}, ${p.b})`;
      swatchHost.appendChild(s);
    }
  }

  // ----- UI wiring
  const bindRange = (id, key, out, target = globals) => {
    const slider = $(id);
    const input = $(out);
    const commit = v => {
      v = Math.max(+slider.min, Math.min(+slider.max, Number.isFinite(v) ? v : 0));
      target[key] = v;
      slider.value = v;
      input.value = v;
      scheduleRender();
      if (target === globals) saveSettings();
    };
    slider.addEventListener('input', e => commit(+e.target.value));
    input.addEventListener('change', e => commit(+e.target.value));
  };
  const bindSelect = (id, key, extra) => {
    $(id).addEventListener('change', e => {
      globals[key] = e.target.value;
      if (extra) extra();
      scheduleRender();
      saveSettings();
    });
  };
  const bindCheckbox = (id, key, extra) => {
    $(id).addEventListener('change', e => {
      globals[key] = e.target.checked;
      if (extra) extra();
      scheduleRender();
      saveSettings();
    });
  };

  bindSelect('background', 'background');
  bindSelect('dither', 'dither', updateDitherUI);
  bindRange('brightness', 'brightness', 'brightnessVal');
  bindRange('contrast', 'contrast', 'contrastVal');
  bindRange('saturation', 'saturation', 'saturationVal');
  bindRange('fsStrength', 'fsStrength', 'fsStrengthVal');
  bindRange('threshold', 'threshold', 'thresholdVal');
  bindCheckbox('invert', 'invert');
  bindSelect('outputMode', 'outputMode', () => { updateDitherUI(); updateColorModeUI(); refreshPaletteSwatches(); });
  bindCheckbox('perceptual', 'perceptual');
  bindCheckbox('gamma', 'gamma');

  $('displayPreset').addEventListener('change', e => {
    globals.displayIndex = +e.target.value;
    applyDisplay();
    saveSettings();
  });
  $('portrait').addEventListener('change', e => {
    globals.portrait = e.target.checked;
    applyDisplay();
    saveSettings();
  });

  // Read the selected preset (+ portrait toggle) and resize canvases.
  function applyDisplay() {
    const d = DISPLAYS[globals.displayIndex] || DISPLAYS[0];
    W = globals.portrait ? d.h : d.w;
    H = globals.portrait ? d.w : d.h;
    canvas.width = W;
    canvas.height = H;
    offCanvas.width = W;
    offCanvas.height = H;
    scheduleRender();
  }

  const commitScale = v => {
    const layer = selectedLayer();
    if (!layer) return;
    v = Math.max(1, Math.min(500, Number.isFinite(v) ? v : 100));
    const oldW = layer.image.width * layer.scale / 100;
    const oldH = layer.image.height * layer.scale / 100;
    const newW = layer.image.width * v / 100;
    const newH = layer.image.height * v / 100;
    layer.x += (oldW - newW) / 2;
    layer.y += (oldH - newH) / 2;
    layer.scale = v;
    $('scale').value = v;
    $('scaleVal').value = v;
    scheduleRender();
  };
  $('scale').addEventListener('input', e => commitScale(+e.target.value));
  $('scaleVal').addEventListener('change', e => commitScale(+e.target.value));

  const commitRotation = v => {
    const layer = selectedLayer();
    if (!layer) return;
    if (!Number.isFinite(v)) v = 0;
    v = ((v + 180) % 360 + 360) % 360 - 180;
    layer.rotation = v;
    $('rotation').value = v;
    $('rotationVal').value = Math.round(v);
    scheduleRender();
  };
  $('rotation').addEventListener('input', e => commitRotation(+e.target.value));
  $('rotationVal').addEventListener('change', e => commitRotation(+e.target.value));
  $('rotate90').addEventListener('click', () => {
    const layer = selectedLayer();
    if (!layer) return;
    pushHistory();
    commitRotation(layer.rotation + 90);
  });
  $('rotateReset').addEventListener('click', () => { pushHistory(); commitRotation(0); });

  $('center').addEventListener('click', () => {
    const layer = selectedLayer();
    if (!layer) return;
    pushHistory();
    const w = layer.image.width * layer.scale / 100;
    const h = layer.image.height * layer.scale / 100;
    layer.x = (W - w) / 2;
    layer.y = (H - h) / 2;
    scheduleRender();
  });

  $('fit').addEventListener('click', () => {
    const layer = selectedLayer();
    if (!layer) return;
    pushHistory();
    const s = Math.min(W / layer.image.width, H / layer.image.height) * 100;
    const newW = layer.image.width * s / 100;
    const newH = layer.image.height * s / 100;
    layer.scale = s;
    layer.x = (W - newW) / 2;
    layer.y = (H - newH) / 2;
    $('scale').value = Math.round(s);
    $('scaleVal').value = Math.round(s);
    scheduleRender();
  });

  $('bgEnable').addEventListener('change', e => {
    const layer = selectedLayer();
    if (!layer) return;
    pushHistory();
    layer.bg.enabled = e.target.checked;
    if (layer.bg.enabled && !layer.bg.color) {
      layer.bg.color = autoDetectBackground(layer.image);
    }
    updateSelectedUI();
    scheduleRender();
  });
  const commitBgField = (field, min, max, sliderId, inputId) => v => {
    const layer = selectedLayer();
    if (!layer) return;
    v = Math.max(min, Math.min(max, Number.isFinite(v) ? v : 0));
    layer.bg[field] = v;
    $(sliderId).value = v;
    $(inputId).value = v;
    scheduleRender();
  };
  const commitTolerance = commitBgField('tolerance', 0, 255, 'bgTolerance', 'bgToleranceVal');
  const commitFeather   = commitBgField('feather',   0, 200, 'bgFeather',   'bgFeatherVal');
  $('bgTolerance').addEventListener('input', e => commitTolerance(+e.target.value));
  $('bgToleranceVal').addEventListener('change', e => commitTolerance(+e.target.value));
  $('bgFeather').addEventListener('input', e => commitFeather(+e.target.value));
  $('bgFeatherVal').addEventListener('change', e => commitFeather(+e.target.value));

  // Snapshot before any per-layer slider drag — undo restores pre-drag state.
  // pointerdown covers mouse + touch + stylus in one shot.
  ['scale', 'rotation', 'bgTolerance', 'bgFeather'].forEach(id => {
    $(id).addEventListener('pointerdown', () => {
      if (selectedLayer()) pushHistory();
    });
  });

  $('bgAuto').addEventListener('click', () => {
    const layer = selectedLayer();
    if (!layer) return;
    pushHistory();
    layer.bg.color = autoDetectBackground(layer.image);
    updateSwatch(layer.bg.color);
    scheduleRender();
  });
  $('bgPick').addEventListener('click', () => {
    if (!selectedLayer()) return;
    setPickMode(!pickMode);
  });

  $('resetGlobals').addEventListener('click', () => {
    const prevDisplayIndex = globals.displayIndex;
    const prevPortrait = globals.portrait;
    Object.assign(globals, GLOBAL_DEFAULTS);
    globals.displayIndex = prevDisplayIndex;
    globals.portrait = prevPortrait;
    syncControlsFromGlobals();
    scheduleRender();
    saveSettings();
  });

  $('clearAll').addEventListener('click', () => {
    if (!layers.length) return;
    if (!confirm(`Remove all ${layers.length} layer(s)?`)) return;
    pushHistory();
    layers = [];
    selectedId = null;
    rebuildLayerList();
    updateSelectedUI();
    scheduleRender();
  });

  // ----- Quick-start profile buttons
  function applyProfile(profile) {
    profile.apply();
    syncControlsFromGlobals();
    applyDisplay();
    saveSettings();
  }
  function syncControlsFromGlobals() {
    $('background').value = globals.background;
    $('dither').value = globals.dither;
    $('invert').checked = globals.invert;
    $('outputMode').value = globals.outputMode;
    $('perceptual').checked = globals.perceptual;
    $('gamma').checked = globals.gamma;
    $('brightness').value = globals.brightness;     $('brightnessVal').value = globals.brightness;
    $('contrast').value = globals.contrast;         $('contrastVal').value = globals.contrast;
    $('saturation').value = globals.saturation;     $('saturationVal').value = globals.saturation;
    $('fsStrength').value = globals.fsStrength;     $('fsStrengthVal').value = globals.fsStrength;
    $('threshold').value = globals.threshold;       $('thresholdVal').value = globals.threshold;
    $('displayPreset').value = globals.displayIndex;
    $('portrait').checked = globals.portrait;
    updateDitherUI();
    updateColorModeUI();
    refreshPaletteSwatches();
  }
  // ----- Preset popover (replaces the old pill row)
  const presetBtn  = $('presetBtn');
  const presetMenu = $('presetMenu');
  PROFILES.forEach(p => {
    const b = document.createElement('button');
    b.type = 'button';
    b.className = 'preset-item';
    b.role = 'menuitem';
    b.innerHTML = `<strong>${p.name}</strong><span>${p.sub}</span>`;
    b.title = `Apply "${p.name}" preset — replaces display, dither, tone & colour settings.`;
    b.addEventListener('click', () => {
      applyProfile(p);
      closePresetMenu();
    });
    presetMenu.appendChild(b);
  });
  function openPresetMenu() {
    presetMenu.classList.remove('hidden');
    presetBtn.setAttribute('aria-expanded', 'true');
  }
  function closePresetMenu() {
    presetMenu.classList.add('hidden');
    presetBtn.setAttribute('aria-expanded', 'false');
  }
  presetBtn.addEventListener('click', e => {
    e.stopPropagation();
    if (presetMenu.classList.contains('hidden')) openPresetMenu();
    else closePresetMenu();
  });
  // Close on outside click or Escape.
  document.addEventListener('click', e => {
    if (!presetMenu.classList.contains('hidden') &&
        !presetMenu.contains(e.target) &&
        e.target !== presetBtn) {
      closePresetMenu();
    }
  });

  // ----- Colour-mode-only controls — saturation only matters when the
  // output palette has chromatic entries (7-color, B+W+Red, B+W+Yellow).
  function updateColorModeUI() {
    const mode = OUTPUT_MODES[globals.outputMode] || OUTPUT_MODES['1bit'];
    $('saturationLabel').classList.toggle('hidden', !mode.chromatic);
  }

  // ----- Undo/redo header buttons
  $('undoBtn').addEventListener('click', undo);
  $('redoBtn').addEventListener('click', redo);

  // ----- Peek button (touch alternative for the spacebar peek shortcut).
  // Hold to swap the preview to the un-dithered composite; release / cancel
  // / pointer-leave restores the dither. Pointer capture keeps the up event
  // arriving on the button even if the finger drifts off it.
  const peekBtn = $('peekBtn');
  function peekDown(e) {
    if (e) e.preventDefault();          // suppress synthetic mouse follow-on
    if (!peekMode) {
      peekMode = true;
      scheduleRender();
    }
    if (e && e.pointerId !== undefined) {
      try { peekBtn.setPointerCapture(e.pointerId); } catch (_) {}
    }
  }
  function peekUp() {
    if (peekMode) {
      peekMode = false;
      scheduleRender();
    }
  }
  peekBtn.addEventListener('pointerdown',  peekDown);
  peekBtn.addEventListener('pointerup',    peekUp);
  peekBtn.addEventListener('pointercancel', peekUp);
  peekBtn.addEventListener('pointerleave', peekUp);

  // ----- File input + drop zone
  $('file').addEventListener('change', e => {
    const inputEl = e.target;
    // Defer the value reset until *after* loadFiles finishes — some browsers
    // release File handles when the input clears, which would break loads
    // that are still in-flight inside the async loop.
    loadFiles(inputEl.files).finally(() => { inputEl.value = ''; });
  });
  const dropZone = $('drop');
  dropZone.addEventListener('dragover',  e => { e.preventDefault(); dropZone.classList.add('over'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('over'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('over');
    loadFiles(e.dataTransfer.files);
  });

  // ----- Clipboard paste
  window.addEventListener('paste', e => {
    const tag = (e.target && e.target.tagName) || '';
    if (tag === 'INPUT' || tag === 'TEXTAREA') return;
    const items = e.clipboardData && e.clipboardData.items;
    if (!items) return;
    const files = [];
    for (const it of items) {
      if (it.kind === 'file' && it.type.startsWith('image/')) {
        const f = it.getAsFile();
        if (f) files.push(f);
      }
    }
    if (files.length) {
      e.preventDefault();
      loadFiles(files);
    }
  });

  $('download').addEventListener('click', downloadBmp);

  // ----- Canvas interaction (drag selected layer)
  function toLayerLocal(layer, cx, cy) {
    const w = layer.image.width * layer.scale / 100;
    const h = layer.image.height * layer.scale / 100;
    const centerX = layer.x + w / 2;
    const centerY = layer.y + h / 2;
    const rad = -(layer.rotation || 0) * Math.PI / 180;
    const dx = cx - centerX;
    const dy = cy - centerY;
    const lx = dx * Math.cos(rad) - dy * Math.sin(rad) + w / 2;
    const ly = dx * Math.sin(rad) + dy * Math.cos(rad) + h / 2;
    return { lx, ly, w, h };
  }

  // Canvas drag uses pointer events so the same code path covers mouse,
  // touch and stylus. setPointerCapture lets the move/up keep firing on the
  // canvas even after the finger leaves the element, removing the need for
  // window-level listeners. touch-action: none on the canvas (CSS) stops
  // the browser's default scroll/zoom from stealing the gesture.
  let dragState = null;
  canvas.addEventListener('pointerdown', e => {
    if (!e.isPrimary) return;          // ignore secondary fingers cleanly
    const rect = canvas.getBoundingClientRect();
    const scaleX = W / rect.width;
    const scaleY = H / rect.height;
    const cx = (e.clientX - rect.left) * scaleX;
    const cy = (e.clientY - rect.top)  * scaleY;

    if (pickMode) {
      const layer = selectedLayer();
      if (layer) {
        const { lx, ly, w, h } = toLayerLocal(layer, cx, cy);
        if (lx >= 0 && ly >= 0 && lx <= w && ly <= h) {
          const ix = Math.round(lx / w * layer.image.naturalWidth);
          const iy = Math.round(ly / h * layer.image.naturalHeight);
          if (ix >= 0 && iy >= 0 && ix < layer.image.naturalWidth && iy < layer.image.naturalHeight) {
            pushHistory();
            layer.bg.color = samplePixel(layer.image, ix, iy);
            if (!layer.bg.enabled) { layer.bg.enabled = true; updateSelectedUI(); }
            updateSwatch(layer.bg.color);
            scheduleRender();
          }
        }
      }
      setPickMode(false);
      return;
    }

    for (let i = layers.length - 1; i >= 0; i--) {
      const layer = layers[i];
      const { lx, ly, w, h } = toLayerLocal(layer, cx, cy);
      if (lx >= 0 && lx <= w && ly >= 0 && ly <= h) {
        selectLayer(layer.id);
        pushHistory();
        dragState = {
          offsetX: cx - layer.x, offsetY: cy - layer.y,
          scaleX, scaleY,
          layerId: layer.id,
          pointerId: e.pointerId,
          startX: layer.x, startY: layer.y,
        };
        canvas.setPointerCapture(e.pointerId);
        canvas.classList.add('panning');
        return;
      }
    }
    selectLayer(null);
  });
  canvas.addEventListener('pointermove', e => {
    if (!dragState || e.pointerId !== dragState.pointerId) return;
    const rect = canvas.getBoundingClientRect();
    const cx = (e.clientX - rect.left) * dragState.scaleX;
    const cy = (e.clientY - rect.top)  * dragState.scaleY;
    const layer = layers.find(l => l.id === dragState.layerId);
    if (!layer) return;
    layer.x = cx - dragState.offsetX;
    layer.y = cy - dragState.offsetY;
    scheduleRender();
  });
  function endCanvasDrag(e) {
    if (!dragState) return;
    if (e && e.pointerId !== dragState.pointerId) return;
    dragState = null;
    canvas.classList.remove('panning');
  }
  canvas.addEventListener('pointerup',     endCanvasDrag);
  canvas.addEventListener('pointercancel', endCanvasDrag);  // iOS system-gesture interrupt

  // ----- File loading
  async function loadFiles(fileList) {
    // Snapshot the FileList before we await anything. Both
    // `<input type=file>.files` and `DataTransfer.files` are *live*, and
    // some browsers release File handles after the input is cleared.
    const files = Array.from(fileList || []).filter(f => f.type.startsWith('image/'));
    if (!files.length) return;

    // Kick off every load in parallel. This calls URL.createObjectURL on each
    // File immediately (synchronously), so the blob URLs are established
    // before any subsequent reset of the input can release them.
    const loaders = files.map(f =>
      loadImage(f).then(img => ({ img, name: f.name }), err => ({ err, name: f.name }))
    );

    // Wait for them all and add in the original order so layer z-order
    // matches selection order in the file dialog.
    const results = await Promise.all(loaders);
    for (const r of results) {
      if (r.img) addLayer(r.img, r.name);
      else console.error('image load failed:', r.name, r.err);
    }
    scheduleRender();
  }
  function loadImage(file) {
    return new Promise((resolve, reject) => {
      const img = new Image();
      img.onload = () => resolve(img);
      img.onerror = reject;
      img.src = URL.createObjectURL(file);
    });
  }
  function addLayer(image, name) {
    const fitScale = Math.min(W / image.width, H / image.height) * 100;
    const scale = Math.min(100, fitScale * 0.8);
    const w = image.width * scale / 100;
    const h = image.height * scale / 100;
    const offset = layers.length * 30;
    pushHistory();
    const layer = {
      id: nextId++,
      image, name,
      x: Math.max(0, Math.min(W - w, (W - w) / 2 + offset)),
      y: Math.max(0, Math.min(H - h, (H - h) / 2 + offset)),
      scale,
      rotation: 0,
      bg: { enabled: false, color: null, tolerance: 30, feather: 20 },
      _processedCanvas: null,
      _processedKey: '',
    };
    layers.push(layer);
    selectLayer(layer.id);
    rebuildLayerList();
  }

  // ----- Layer operations
  function selectedLayer() {
    return layers.find(l => l.id === selectedId) || null;
  }
  function selectLayer(id) {
    selectedId = id;
    rebuildLayerList();
    updateSelectedUI();
    scheduleRender();
  }

  function updateSelectedUI() {
    const layer = selectedLayer();
    $('layerEmpty').classList.toggle('hidden', !!layer);
    $('selHead').classList.toggle('hidden', !layer);
    $('selControls').classList.toggle('hidden', !layer);
    $('selControlsRot').classList.toggle('hidden', !layer);
    $('selControls2').classList.toggle('hidden', !layer);
    $('bgHead').classList.toggle('hidden', !layer);
    $('bgControls').classList.toggle('hidden', !layer);
    const showBg = layer && layer.bg.enabled;
    $('bgControls2').classList.toggle('hidden', !showBg);
    $('bgControls3').classList.toggle('hidden', !showBg);
    if (layer) {
      const s = Math.round(layer.scale);
      $('scale').value = s;
      $('scaleVal').value = s;
      $('rotation').value = layer.rotation;
      $('rotationVal').value = Math.round(layer.rotation);
      $('bgEnable').checked = layer.bg.enabled;
      $('bgTolerance').value = layer.bg.tolerance;
      $('bgToleranceVal').value = layer.bg.tolerance;
      $('bgFeather').value = layer.bg.feather;
      $('bgFeatherVal').value = layer.bg.feather;
      updateSwatch(layer.bg.color);
    }
    if (!layer) setPickMode(false);
  }

  function updateSwatch(color) {
    const sw = $('bgSwatch');
    if (!color) {
      sw.style.background = 'repeating-conic-gradient(#9999 0 25%, #ddd5 0 50%) 0 0 / 8px 8px';
      sw.title = 'auto (samples image corners)';
    } else {
      sw.style.background = `rgb(${color.r}, ${color.g}, ${color.b})`;
      sw.title = `rgb(${color.r}, ${color.g}, ${color.b})`;
    }
  }

  function setPickMode(on) {
    pickMode = on && selectedLayer() !== null;
    $('bgPick').textContent = pickMode ? 'Cancel' : 'Pick';
    canvas.style.cursor = pickMode ? 'crosshair' : '';
  }

  function deleteLayer(id) {
    const i = layers.findIndex(l => l.id === id);
    if (i < 0) return;
    pushHistory();
    layers.splice(i, 1);
    if (selectedId === id) selectedId = null;
    rebuildLayerList();
    updateSelectedUI();
    scheduleRender();
  }

  function moveLayer(id, dir) {
    const i = layers.findIndex(l => l.id === id);
    if (i < 0) return;
    const j = i + dir;
    if (j < 0 || j >= layers.length) return;
    pushHistory();
    [layers[i], layers[j]] = [layers[j], layers[i]];
    rebuildLayerList();
    scheduleRender();
  }

  // Drop layer A onto layer B's position.
  function reorderLayer(draggedId, targetId) {
    const fromIdx = layers.findIndex(l => l.id === draggedId);
    const toIdx   = layers.findIndex(l => l.id === targetId);
    if (fromIdx < 0 || toIdx < 0 || fromIdx === toIdx) return;
    pushHistory();
    const [moved] = layers.splice(fromIdx, 1);
    // toIdx might shift after the splice — recompute.
    const insertAt = layers.findIndex(l => l.id === targetId);
    layers.splice(insertAt, 0, moved);
    rebuildLayerList();
    scheduleRender();
  }

  function rebuildLayerList() {
    const list = $('layers');
    list.innerHTML = '';
    if (!layers.length) {
      list.innerHTML = '<div class="empty">No layers yet</div>';
      canvas.classList.remove('pan');
      return;
    }
    canvas.classList.add('pan');
    // Render top-most first; visual order = reverse of array order.
    [...layers].reverse().forEach(layer => {
      const el = document.createElement('div');
      el.className = 'layer' + (layer.id === selectedId ? ' selected' : '');
      el.dataset.id = layer.id;
      el.draggable = true;

      const grip = document.createElement('span');
      grip.className = 'grip';
      grip.textContent = '⋮⋮';
      grip.title = 'Drag to reorder';
      el.appendChild(grip);

      const thumb = document.createElement('canvas');
      thumb.width = 48; thumb.height = 32;
      const tctx = thumb.getContext('2d');
      tctx.fillStyle = '#fff';
      tctx.fillRect(0, 0, 48, 32);
      const ts = Math.min(48 / layer.image.width, 32 / layer.image.height);
      const tw = layer.image.width * ts;
      const th = layer.image.height * ts;
      tctx.drawImage(layer.image, (48 - tw) / 2, (32 - th) / 2, tw, th);
      el.appendChild(thumb);

      const name = document.createElement('span');
      name.className = 'name';
      name.textContent = layer.name;
      el.appendChild(name);

      const actions = document.createElement('span');
      actions.className = 'actions';
      const up = document.createElement('button');
      up.textContent = '↑'; up.title = 'Bring forward';
      up.addEventListener('click', e => { e.stopPropagation(); moveLayer(layer.id, +1); });
      const down = document.createElement('button');
      down.textContent = '↓'; down.title = 'Send backward';
      down.addEventListener('click', e => { e.stopPropagation(); moveLayer(layer.id, -1); });
      const del = document.createElement('button');
      del.textContent = '×'; del.title = 'Delete (Del)';
      del.addEventListener('click', e => { e.stopPropagation(); deleteLayer(layer.id); });
      actions.append(up, down, del);
      el.appendChild(actions);

      el.addEventListener('click', () => selectLayer(layer.id));

      // ---- HTML5 drag-to-reorder ----
      el.addEventListener('dragstart', e => {
        el.classList.add('dragging');
        e.dataTransfer.effectAllowed = 'move';
        e.dataTransfer.setData('text/plain', String(layer.id));
      });
      el.addEventListener('dragend', () => {
        el.classList.remove('dragging');
        document.querySelectorAll('.layer.drop-target').forEach(n => n.classList.remove('drop-target'));
      });
      el.addEventListener('dragover', e => {
        e.preventDefault();
        e.dataTransfer.dropEffect = 'move';
        el.classList.add('drop-target');
      });
      el.addEventListener('dragleave', () => el.classList.remove('drop-target'));
      el.addEventListener('drop', e => {
        e.preventDefault();
        el.classList.remove('drop-target');
        const draggedId = +e.dataTransfer.getData('text/plain');
        if (draggedId && draggedId !== layer.id) reorderLayer(draggedId, layer.id);
      });

      list.appendChild(el);
    });
  }

  function updateDitherUI() {
    const isErrorDiffusion = ERROR_DIFFUSION_KEYS.has(globals.dither);
    const isThreshold = globals.dither === 'none';
    $('diffStrengthLabel').classList.toggle('hidden', !isErrorDiffusion);
    // Threshold is a 1-bit-only concept (single cut between black & white).
    $('thresholdLabel').classList.toggle('hidden', !isThreshold || globals.outputMode !== '1bit');
  }

  // ----- Render pipeline
  function scheduleRender() {
    if (renderPending) return;
    renderPending = true;
    requestAnimationFrame(() => { renderPending = false; render(); });
  }

  function render() {
    offCtx.fillStyle = globals.background === 'black' ? '#000' : '#fff';
    offCtx.fillRect(0, 0, W, H);

    for (const layer of layers) {
      const w = layer.image.width * layer.scale / 100;
      const h = layer.image.height * layer.scale / 100;
      const source = drawSourceFor(layer);
      const rot = layer.rotation || 0;
      if (rot === 0) {
        offCtx.drawImage(source, layer.x, layer.y, w, h);
      } else {
        offCtx.save();
        offCtx.translate(layer.x + w / 2, layer.y + h / 2);
        offCtx.rotate(rot * Math.PI / 180);
        offCtx.drawImage(source, -w / 2, -h / 2, w, h);
        offCtx.restore();
      }
    }

    if (!layers.length) {
      ctx.fillStyle = globals.background === 'black' ? '#000' : '#fff';
      ctx.fillRect(0, 0, W, H);
      bmpBlob = null;
      $('download').disabled = true;
      setStatus('Drop, paste, or click to add an image', null);
      return;
    }

    // While spacebar is held, blit the un-dithered composite directly.
    if (peekMode) {
      ctx.drawImage(offCanvas, 0, 0);
      drawSelectionOverlay();
      setStatus(`PEEK · un-dithered composite (release space to dither)`, 'warn');
      return;
    }

    const imageData = offCtx.getImageData(0, 0, W, H);
    const mode = OUTPUT_MODES[globals.outputMode] || OUTPUT_MODES['1bit'];

    if (mode.encoder === 'bmp1') {
      const gray = toGrayscale(imageData, globals);
      const bits = dither1bit(gray, globals);
      paintPreviewBits(bits);
      drawSelectionOverlay();
      bmpBlob = buildBmp1(bits);
      $('download').disabled = false;
      const isTrmnl = (W === TRMNL_W && H === TRMNL_H && bmpBlob.size === TRMNL_BMP_SIZE);
      setStatus(
        `${layers.length} layer(s) · ${W}×${H} · ${bmpBlob.size.toLocaleString()} B · 1-bit BMP${isTrmnl ? ' ✓ matches Terminus / TRMNL' : ''}`,
        isTrmnl ? 'ok' : 'warn',
      );
    } else if (mode.encoder === 'bmp24') {
      const rgb = quantize7(imageData, globals);
      paintPreviewRGB(rgb);
      drawSelectionOverlay();
      bmpBlob = buildBmp24(rgb);
      $('download').disabled = false;
      const isPhotoPainter = (W === 800 && H === 480) || (W === 480 && H === 800);
      setStatus(
        `${layers.length} layer(s) · ${W}×${H} · ${bmpBlob.size.toLocaleString()} B · 24-bit BMP (${mode.name})${isPhotoPainter ? ' ✓ matches Waveshare PhotoPainter' : ''}`,
        isPhotoPainter ? 'ok' : 'warn',
      );
    } else {
      // bmp4 — indexed 4-bit BMP for 4-gray and the 2-bit accent modes.
      const indices = quantizeIndexed(imageData, mode.palette, globals);
      paintPreviewIndexed(indices, mode.palette);
      drawSelectionOverlay();
      bmpBlob = buildBmp4(indices, mode.palette);
      $('download').disabled = false;
      setStatus(
        `${layers.length} layer(s) · ${W}×${H} · ${bmpBlob.size.toLocaleString()} B · 4-bit BMP (${mode.name})`,
        'warn',
      );
    }
  }

  function paintPreviewBits(bits) {
    const preview = ctx.createImageData(W, H);
    for (let i = 0; i < W * H; i++) {
      const v = bits[i] ? 255 : 0;
      preview.data[i * 4]     = v;
      preview.data[i * 4 + 1] = v;
      preview.data[i * 4 + 2] = v;
      preview.data[i * 4 + 3] = 255;
    }
    ctx.putImageData(preview, 0, 0);
  }

  function paintPreviewRGB(rgb) {
    const preview = ctx.createImageData(W, H);
    for (let i = 0; i < W * H; i++) {
      preview.data[i * 4]     = rgb[i * 3];
      preview.data[i * 4 + 1] = rgb[i * 3 + 1];
      preview.data[i * 4 + 2] = rgb[i * 3 + 2];
      preview.data[i * 4 + 3] = 255;
    }
    ctx.putImageData(preview, 0, 0);
  }

  function drawSelectionOverlay() {
    const sel = selectedLayer();
    if (!sel) return;
    const w = sel.image.width * sel.scale / 100;
    const h = sel.image.height * sel.scale / 100;
    const rot = sel.rotation || 0;
    ctx.save();
    ctx.strokeStyle = '#2a7';
    ctx.lineWidth = 2;
    ctx.setLineDash([6, 4]);
    if (rot === 0) {
      ctx.strokeRect(sel.x, sel.y, w, h);
    } else {
      ctx.translate(sel.x + w / 2, sel.y + h / 2);
      ctx.rotate(rot * Math.PI / 180);
      ctx.strokeRect(-w / 2, -h / 2, w, h);
    }
    ctx.restore();
  }

  // ----- Background removal (chroma-key with feather)
  function samplePixel(image, x, y) {
    const cvs = document.createElement('canvas');
    cvs.width = image.naturalWidth; cvs.height = image.naturalHeight;
    const c = cvs.getContext('2d', { willReadFrequently: true });
    c.drawImage(image, 0, 0);
    const d = c.getImageData(x, y, 1, 1).data;
    return { r: d[0], g: d[1], b: d[2] };
  }

  function autoDetectBackground(image) {
    const cvs = document.createElement('canvas');
    cvs.width = image.naturalWidth; cvs.height = image.naturalHeight;
    const c = cvs.getContext('2d', { willReadFrequently: true });
    c.drawImage(image, 0, 0);
    const corners = [
      [0, 0], [cvs.width - 1, 0], [0, cvs.height - 1], [cvs.width - 1, cvs.height - 1],
    ];
    let r = 0, g = 0, b = 0;
    for (const [x, y] of corners) {
      const d = c.getImageData(x, y, 1, 1).data;
      r += d[0]; g += d[1]; b += d[2];
    }
    return { r: Math.round(r / 4), g: Math.round(g / 4), b: Math.round(b / 4) };
  }

  function drawSourceFor(layer) {
    if (!layer.bg.enabled || !layer.bg.color) return layer.image;
    const { color, tolerance, feather } = layer.bg;
    const key = `${color.r},${color.g},${color.b},${tolerance},${feather}`;
    if (layer._processedKey === key && layer._processedCanvas) return layer._processedCanvas;
    const cvs = document.createElement('canvas');
    cvs.width = layer.image.naturalWidth;
    cvs.height = layer.image.naturalHeight;
    const c = cvs.getContext('2d', { willReadFrequently: true });
    c.drawImage(layer.image, 0, 0);
    const data = c.getImageData(0, 0, cvs.width, cvs.height);
    const px = data.data;
    const core = tolerance;
    const outer = tolerance + feather;
    const core2 = core * core;
    const outer2 = outer * outer;
    for (let i = 0; i < px.length; i += 4) {
      const dr = px[i] - color.r;
      const dg = px[i + 1] - color.g;
      const db = px[i + 2] - color.b;
      const d2 = dr * dr + dg * dg + db * db;
      if (d2 <= core2) {
        px[i + 3] = 0;
      } else if (d2 < outer2) {
        const d = Math.sqrt(d2);
        const a = (d - core) / feather;
        px[i + 3] = Math.round(px[i + 3] * a);
      }
    }
    c.putImageData(data, 0, 0);
    layer._processedCanvas = cvs;
    layer._processedKey = key;
    return cvs;
  }

  function toGrayscale(imageData, s) {
    const n = W * H;
    const gray = new Float32Array(n);
    const d = imageData.data;
    const cMul = ((s.contrast / 100) + 1) ** 2;
    for (let i = 0; i < n; i++) {
      let v = 0.299 * d[i * 4] + 0.587 * d[i * 4 + 1] + 0.114 * d[i * 4 + 2];
      v = (v - 128) * cMul + 128;
      v += s.brightness;
      if (s.invert) v = 255 - v;
      gray[i] = Math.max(0, Math.min(255, v));
    }
    return gray;
  }

  // ----- 1-bit path
  function dither1bit(gray, s) {
    const n = W * H;
    const bits = new Uint8Array(n);
    const useGamma = s.gamma;
    const threshold = useGamma ? SRGB_TO_LIN[Math.round(s.threshold)] : s.threshold;
    const midpoint = useGamma ? SRGB_TO_LIN[127] : 127;
    const buf = new Float32Array(n);
    if (useGamma) {
      for (let i = 0; i < n; i++) buf[i] = SRGB_TO_LIN[Math.round(gray[i])];
    } else {
      for (let i = 0; i < n; i++) buf[i] = gray[i];
    }
    if (s.dither === 'none') {
      for (let i = 0; i < n; i++) bits[i] = buf[i] > threshold ? 1 : 0;
      return bits;
    }
    if (s.dither === 'bayer4' || s.dither === 'bayer8' || s.dither === 'blueNoise') {
      return orderedBits(buf, s.dither, useGamma);
    }
    const kernel = KERNELS[s.dither];
    const strength = s.fsStrength / 100;
    for (let y = 0; y < H; y++) {
      for (let x = 0; x < W; x++) {
        const idx = y * W + x;
        const old = buf[idx];
        const bit = old > midpoint ? 1 : 0;
        const newVal = bit ? 255 : 0;
        const target = useGamma ? SRGB_TO_LIN[newVal] : newVal;
        bits[idx] = bit;
        const err = (old - target) * strength;
        for (const [dx, dy, w] of kernel.offsets) {
          const nx = x + dx, ny = y + dy;
          if (nx < 0 || nx >= W || ny >= H) continue;
          buf[ny * W + nx] += err * w / kernel.denom;
        }
      }
    }
    return bits;
  }

  function orderedBits(buf, mode, useGamma) {
    const bits = new Uint8Array(W * H);
    for (let y = 0; y < H; y++) {
      for (let x = 0; x < W; x++) {
        let t;
        if (mode === 'bayer4')      t = BAYER4[y & 3][x & 3];
        else if (mode === 'bayer8') t = BAYER8[y & 7][x & 7];
        else                        t = ign(x, y) * 255;
        if (useGamma) t = SRGB_TO_LIN[Math.round(t)];
        bits[y * W + x] = buf[y * W + x] > t ? 1 : 0;
      }
    }
    return bits;
  }

  // ----- 7-color quantization
  function nearestPaletteIndexRGB(r, g, b, palette) {
    let best = 0, bestD = Infinity;
    for (let i = 0; i < palette.length; i++) {
      const p = palette[i];
      const dr = r - p.r, dg = g - p.g, db = b - p.b;
      const d = dr * dr + dg * dg + db * db;
      if (d < bestD) { bestD = d; best = i; }
    }
    return best;
  }

  function nearestPaletteIndexLab(lr, lg, lb) {
    const [L, a, b] = rgbLinearToOklab(lr, lg, lb);
    let best = 0, bestD = Infinity;
    for (let i = 0; i < PALETTE_LAB.length; i++) {
      const [pL, pa, pb] = PALETTE_LAB[i];
      const dL = L - pL, da = a - pa, db_ = b - pb;
      const d = dL * dL + da * da + db_ * db_;
      if (d < bestD) { bestD = d; best = i; }
    }
    return best;
  }

  function quantize7(imageData, s) {
    const n = W * H;
    const d = imageData.data;
    const cMul = ((s.contrast / 100) + 1) ** 2;
    const satMul = s.saturation / 100;
    const useGamma = s.gamma;
    const usePerceptual = s.perceptual;
    const palette = useGamma ? PALETTE_LIN : PALETTE_7;

    const rBuf = new Float32Array(n);
    const gBuf = new Float32Array(n);
    const bBuf = new Float32Array(n);
    for (let i = 0; i < n; i++) {
      let r = d[i * 4], g = d[i * 4 + 1], b = d[i * 4 + 2];
      r = (r - 128) * cMul + 128 + s.brightness;
      g = (g - 128) * cMul + 128 + s.brightness;
      b = (b - 128) * cMul + 128 + s.brightness;
      if (satMul !== 1) {
        const lum = 0.299 * r + 0.587 * g + 0.114 * b;
        r = lum + (r - lum) * satMul;
        g = lum + (g - lum) * satMul;
        b = lum + (b - lum) * satMul;
      }
      if (s.invert) { r = 255 - r; g = 255 - g; b = 255 - b; }
      r = Math.max(0, Math.min(255, r));
      g = Math.max(0, Math.min(255, g));
      b = Math.max(0, Math.min(255, b));
      if (useGamma) {
        rBuf[i] = SRGB_TO_LIN[Math.round(r)];
        gBuf[i] = SRGB_TO_LIN[Math.round(g)];
        bBuf[i] = SRGB_TO_LIN[Math.round(b)];
      } else {
        rBuf[i] = r; gBuf[i] = g; bBuf[i] = b;
      }
    }

    let pickIdx;
    if (usePerceptual && useGamma) {
      pickIdx = (r, g, b) => nearestPaletteIndexLab(r, g, b);
    } else if (usePerceptual) {
      pickIdx = (r, g, b) => nearestPaletteIndexLab(
        SRGB_TO_LIN[Math.max(0, Math.min(255, Math.round(r)))],
        SRGB_TO_LIN[Math.max(0, Math.min(255, Math.round(g)))],
        SRGB_TO_LIN[Math.max(0, Math.min(255, Math.round(b)))],
      );
    } else {
      pickIdx = (r, g, b) => nearestPaletteIndexRGB(r, g, b, palette);
    }

    const out = new Uint8Array(n * 3);
    const writeOut = (idx, paletteIdx) => {
      const sp = PALETTE_7[paletteIdx];
      out[idx * 3]     = sp.r;
      out[idx * 3 + 1] = sp.g;
      out[idx * 3 + 2] = sp.b;
    };

    if (s.dither === 'none') {
      for (let i = 0; i < n; i++) {
        writeOut(i, pickIdx(rBuf[i], gBuf[i], bBuf[i]));
      }
      return out;
    }

    if (s.dither === 'bayer4' || s.dither === 'bayer8' || s.dither === 'blueNoise') {
      const scale = useGamma ? 0.15 * 255 : 0.4 * 255;
      for (let y = 0; y < H; y++) {
        for (let x = 0; x < W; x++) {
          const idx = y * W + x;
          let t;
          if (s.dither === 'bayer4')      t = BAYER4[y & 3][x & 3] / 255;
          else if (s.dither === 'bayer8') t = BAYER8[y & 7][x & 7] / 255;
          else                            t = ign(x, y);
          const bias = (t - 0.5) * scale;
          writeOut(idx, pickIdx(rBuf[idx] + bias, gBuf[idx] + bias, bBuf[idx] + bias));
        }
      }
      return out;
    }

    const kernel = KERNELS[s.dither];
    const strength = s.fsStrength / 100;
    for (let y = 0; y < H; y++) {
      for (let x = 0; x < W; x++) {
        const idx = y * W + x;
        const or = rBuf[idx], og = gBuf[idx], ob = bBuf[idx];
        const pi = pickIdx(or, og, ob);
        writeOut(idx, pi);
        const pal = palette[pi];
        const er = (or - pal.r) * strength;
        const eg = (og - pal.g) * strength;
        const eb = (ob - pal.b) * strength;
        for (const [dx, dy, wgt] of kernel.offsets) {
          const nx = x + dx, ny = y + dy;
          if (nx < 0 || nx >= W || ny >= H) continue;
          const nIdx = ny * W + nx;
          const k = wgt / kernel.denom;
          rBuf[nIdx] += er * k;
          gBuf[nIdx] += eg * k;
          bBuf[nIdx] += eb * k;
        }
      }
    }
    return out;
  }

  // ----- Indexed quantisation (used by 4-gray and the 2-bit accent modes)
  // Generalises quantize7 — same tone/gamma pre-pass and dither kernels, but
  // returns a `Uint8Array` of palette indices instead of RGB bytes so the
  // 4-bit BMP encoder can pack them directly.
  function quantizeIndexed(imageData, palette, s) {
    const n = W * H;
    const d = imageData.data;
    const cMul = ((s.contrast / 100) + 1) ** 2;
    const satMul = s.saturation / 100;
    const useGamma = s.gamma;
    const usePerceptual = s.perceptual;

    const palLin = palette.map(p => ({ r: SRGB_TO_LIN[p.r], g: SRGB_TO_LIN[p.g], b: SRGB_TO_LIN[p.b] }));
    const palLab = palLin.map(p => rgbLinearToOklab(p.r, p.g, p.b));
    const palWork = useGamma ? palLin : palette;

    const rBuf = new Float32Array(n);
    const gBuf = new Float32Array(n);
    const bBuf = new Float32Array(n);
    for (let i = 0; i < n; i++) {
      let r = d[i * 4], g = d[i * 4 + 1], b = d[i * 4 + 2];
      r = (r - 128) * cMul + 128 + s.brightness;
      g = (g - 128) * cMul + 128 + s.brightness;
      b = (b - 128) * cMul + 128 + s.brightness;
      if (satMul !== 1) {
        const lum = 0.299 * r + 0.587 * g + 0.114 * b;
        r = lum + (r - lum) * satMul;
        g = lum + (g - lum) * satMul;
        b = lum + (b - lum) * satMul;
      }
      if (s.invert) { r = 255 - r; g = 255 - g; b = 255 - b; }
      r = Math.max(0, Math.min(255, r));
      g = Math.max(0, Math.min(255, g));
      b = Math.max(0, Math.min(255, b));
      if (useGamma) {
        rBuf[i] = SRGB_TO_LIN[Math.round(r)];
        gBuf[i] = SRGB_TO_LIN[Math.round(g)];
        bBuf[i] = SRGB_TO_LIN[Math.round(b)];
      } else {
        rBuf[i] = r; gBuf[i] = g; bBuf[i] = b;
      }
    }

    const nearestRGB = (r, g, b) => {
      let best = 0, bestD = Infinity;
      for (let i = 0; i < palWork.length; i++) {
        const p = palWork[i];
        const dr = r - p.r, dg = g - p.g, db = b - p.b;
        const d2 = dr * dr + dg * dg + db * db;
        if (d2 < bestD) { bestD = d2; best = i; }
      }
      return best;
    };
    const nearestLab = (lr, lg, lb) => {
      const [L, a, B] = rgbLinearToOklab(lr, lg, lb);
      let best = 0, bestD = Infinity;
      for (let i = 0; i < palLab.length; i++) {
        const [pL, pa, pb] = palLab[i];
        const dL = L - pL, da = a - pa, db_ = B - pb;
        const d2 = dL * dL + da * da + db_ * db_;
        if (d2 < bestD) { bestD = d2; best = i; }
      }
      return best;
    };
    let pickIdx;
    if (usePerceptual && useGamma) {
      pickIdx = nearestLab;
    } else if (usePerceptual) {
      pickIdx = (r, g, b) => nearestLab(
        SRGB_TO_LIN[Math.max(0, Math.min(255, Math.round(r)))],
        SRGB_TO_LIN[Math.max(0, Math.min(255, Math.round(g)))],
        SRGB_TO_LIN[Math.max(0, Math.min(255, Math.round(b)))],
      );
    } else {
      pickIdx = nearestRGB;
    }

    const out = new Uint8Array(n);

    if (s.dither === 'none') {
      for (let i = 0; i < n; i++) out[i] = pickIdx(rBuf[i], gBuf[i], bBuf[i]);
      return out;
    }
    if (s.dither === 'bayer4' || s.dither === 'bayer8' || s.dither === 'blueNoise') {
      const scale = useGamma ? 0.15 * 255 : 0.4 * 255;
      for (let y = 0; y < H; y++) {
        for (let x = 0; x < W; x++) {
          const idx = y * W + x;
          let t;
          if (s.dither === 'bayer4')      t = BAYER4[y & 3][x & 3] / 255;
          else if (s.dither === 'bayer8') t = BAYER8[y & 7][x & 7] / 255;
          else                            t = ign(x, y);
          const bias = (t - 0.5) * scale;
          out[idx] = pickIdx(rBuf[idx] + bias, gBuf[idx] + bias, bBuf[idx] + bias);
        }
      }
      return out;
    }

    // Error diffusion against the supplied palette.
    const kernel = KERNELS[s.dither];
    const strength = s.fsStrength / 100;
    for (let y = 0; y < H; y++) {
      for (let x = 0; x < W; x++) {
        const idx = y * W + x;
        const or = rBuf[idx], og = gBuf[idx], ob = bBuf[idx];
        const pi = pickIdx(or, og, ob);
        out[idx] = pi;
        const pal = palWork[pi];
        const er = (or - pal.r) * strength;
        const eg = (og - pal.g) * strength;
        const eb = (ob - pal.b) * strength;
        for (const [dx, dy, wgt] of kernel.offsets) {
          const nx = x + dx, ny = y + dy;
          if (nx < 0 || nx >= W || ny >= H) continue;
          const nIdx = ny * W + nx;
          const k = wgt / kernel.denom;
          rBuf[nIdx] += er * k;
          gBuf[nIdx] += eg * k;
          bBuf[nIdx] += eb * k;
        }
      }
    }
    return out;
  }

  function paintPreviewIndexed(indices, palette) {
    const preview = ctx.createImageData(W, H);
    for (let i = 0; i < indices.length; i++) {
      const p = palette[indices[i]] || palette[0];
      preview.data[i * 4]     = p.r;
      preview.data[i * 4 + 1] = p.g;
      preview.data[i * 4 + 2] = p.b;
      preview.data[i * 4 + 3] = 255;
    }
    ctx.putImageData(preview, 0, 0);
  }

  // ----- BMP encoders
  function buildBmp1(bits) {
    const rowBytes = Math.ceil(W / 8);
    const rowStride = Math.ceil(rowBytes / 4) * 4;
    const pixelSize = rowStride * H;
    const headerSize = 62;
    const total = headerSize + pixelSize;
    const buf = new ArrayBuffer(total);
    const view = new DataView(buf);
    const bytes = new Uint8Array(buf);
    bytes[0] = 0x42; bytes[1] = 0x4D;
    view.setUint32(2, total, true);
    view.setUint32(6, 0, true);
    view.setUint32(10, headerSize, true);
    view.setUint32(14, 40, true);
    view.setInt32(18, W, true);
    view.setInt32(22, H, true);
    view.setUint16(26, 1, true);
    view.setUint16(28, 1, true);
    view.setUint32(30, 0, true);
    view.setUint32(34, pixelSize, true);
    view.setInt32(38, 2835, true);
    view.setInt32(42, 2835, true);
    view.setUint32(46, 2, true);
    view.setUint32(50, 0, true);
    bytes[54] = 0x00; bytes[55] = 0x00; bytes[56] = 0x00; bytes[57] = 0x00;
    bytes[58] = 0xFF; bytes[59] = 0xFF; bytes[60] = 0xFF; bytes[61] = 0x00;
    for (let y = 0; y < H; y++) {
      const bmpRow = H - 1 - y;
      const rowOffset = headerSize + bmpRow * rowStride;
      for (let byteX = 0; byteX < rowBytes; byteX++) {
        let b = 0;
        const base = byteX * 8;
        for (let bit = 0; bit < 8; bit++) {
          const px = base + bit;
          if (px < W && bits[y * W + px]) b |= (1 << (7 - bit));
        }
        bytes[rowOffset + byteX] = b;
      }
    }
    return new Blob([buf], { type: 'image/bmp' });
  }

  // 4-bit indexed BMP. 16-entry palette in BGRA (only the first
  // `palette.length` slots populated; the rest are zeroed). Two pixels per
  // byte, high nibble first, rows padded to a 4-byte boundary, bottom-up.
  function buildBmp4(indices, palette) {
    const colorCount = 16;
    const headerSize = 14 + 40 + colorCount * 4;
    const rowBytes = Math.ceil(W / 2);
    const rowStride = Math.ceil(rowBytes / 4) * 4;
    const pixelSize = rowStride * H;
    const total = headerSize + pixelSize;
    const buf = new ArrayBuffer(total);
    const view = new DataView(buf);
    const bytes = new Uint8Array(buf);

    bytes[0] = 0x42; bytes[1] = 0x4D;
    view.setUint32(2, total, true);
    view.setUint32(6, 0, true);
    view.setUint32(10, headerSize, true);

    view.setUint32(14, 40, true);
    view.setInt32(18, W, true);
    view.setInt32(22, H, true);
    view.setUint16(26, 1, true);
    view.setUint16(28, 4, true);                  // 4 bits per pixel
    view.setUint32(30, 0, true);                  // BI_RGB
    view.setUint32(34, pixelSize, true);
    view.setInt32(38, 2835, true);
    view.setInt32(42, 2835, true);
    view.setUint32(46, palette.length, true);     // colours used
    view.setUint32(50, palette.length, true);     // important colours

    for (let i = 0; i < colorCount; i++) {
      const off = 54 + i * 4;
      const p = palette[i];
      if (p) {
        bytes[off]     = p.b;
        bytes[off + 1] = p.g;
        bytes[off + 2] = p.r;
        bytes[off + 3] = 0;
      }
    }

    for (let y = 0; y < H; y++) {
      const bmpRow = H - 1 - y;
      const rowOffset = headerSize + bmpRow * rowStride;
      for (let x = 0; x < W; x++) {
        const idx = indices[y * W + x] & 0x0F;
        const byteX = rowOffset + (x >> 1);
        if ((x & 1) === 0) {
          bytes[byteX] = idx << 4;                // first pixel = high nibble
        } else {
          bytes[byteX] |= idx;                    // second pixel = low nibble
        }
      }
    }

    return new Blob([buf], { type: 'image/bmp' });
  }

  function buildBmp24(rgb) {
    const rowStride = Math.ceil(W * 3 / 4) * 4;
    const pixelSize = rowStride * H;
    const headerSize = 54;
    const total = headerSize + pixelSize;
    const buf = new ArrayBuffer(total);
    const view = new DataView(buf);
    const bytes = new Uint8Array(buf);
    bytes[0] = 0x42; bytes[1] = 0x4D;
    view.setUint32(2, total, true);
    view.setUint32(6, 0, true);
    view.setUint32(10, headerSize, true);
    view.setUint32(14, 40, true);
    view.setInt32(18, W, true);
    view.setInt32(22, H, true);
    view.setUint16(26, 1, true);
    view.setUint16(28, 24, true);
    view.setUint32(30, 0, true);
    view.setUint32(34, pixelSize, true);
    view.setInt32(38, 2835, true);
    view.setInt32(42, 2835, true);
    view.setUint32(46, 0, true);
    view.setUint32(50, 0, true);
    for (let y = 0; y < H; y++) {
      const srcRow = y * W * 3;
      const dstRow = headerSize + (H - 1 - y) * rowStride;
      for (let x = 0; x < W; x++) {
        bytes[dstRow + x * 3]     = rgb[srcRow + x * 3 + 2];
        bytes[dstRow + x * 3 + 1] = rgb[srcRow + x * 3 + 1];
        bytes[dstRow + x * 3 + 2] = rgb[srcRow + x * 3];
      }
    }
    return new Blob([buf], { type: 'image/bmp' });
  }

  function downloadBmp() {
    if (!bmpBlob) return;
    const url = URL.createObjectURL(bmpBlob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `merged-${W}x${H}-${globals.outputMode}.bmp`;
    a.click();
    URL.revokeObjectURL(url);
  }

  function setStatus(msg, kind) {
    $('status').textContent = msg;
    $('status').className = 'status' + (kind ? ' ' + kind : '');
  }

  // Keyboard shortcuts:
  //   Delete / Backspace — remove selected layer
  //   R / Shift-R        — rotate selected layer ±90°
  //   Ctrl/Cmd-Z         — undo
  //   Ctrl-Shift-Z / Y   — redo
  //   Space (held)       — peek un-dithered composite
  window.addEventListener('keydown', e => {
    const tag = e.target.tagName;
    const inField = tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT';
    const isTextInput = inField && (tag === 'TEXTAREA' ||
        (tag === 'INPUT' && (e.target.type === 'text' || e.target.type === 'number')));
    if ((e.ctrlKey || e.metaKey) && !isTextInput) {
      const k = e.key.toLowerCase();
      if (k === 'z' && !e.shiftKey) { undo(); e.preventDefault(); return; }
      if ((k === 'z' && e.shiftKey) || k === 'y') { redo(); e.preventDefault(); return; }
    }
    if (inField) return;
    if ((e.key === 'Delete' || e.key === 'Backspace') && selectedId !== null) {
      deleteLayer(selectedId); e.preventDefault();
    } else if ((e.key === 'r' || e.key === 'R') && selectedId !== null) {
      const layer = selectedLayer();
      if (layer) { pushHistory(); commitRotation(layer.rotation + (e.shiftKey ? -90 : 90)); }
      e.preventDefault();
    } else if (e.code === 'Space' && !peekMode) {
      peekMode = true; scheduleRender(); e.preventDefault();
    } else if (e.key === 'Escape' && !presetMenu.classList.contains('hidden')) {
      closePresetMenu();
      presetBtn.focus();
      e.preventDefault();
    }
  });
  window.addEventListener('keyup', e => {
    if (e.code === 'Space' && peekMode) {
      peekMode = false; scheduleRender(); e.preventDefault();
    }
  });

  // Restore persisted settings, sync UI controls, then render.
  loadSettings();
  syncControlsFromGlobals();
  applyDisplay();
  syncHistoryButtons();
})();
</script>

</body>
</html>
