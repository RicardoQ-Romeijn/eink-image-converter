<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>E-ink Image Converter · 1-bit / 2-bit / 7-color BMPs</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<header class="appbar">
  <div class="appbar-controls">
    <!-- Preset popover — applies a full settings stack in one go. -->
    <div class="popover-wrap">
      <button id="presetBtn" class="popover-trigger" type="button" aria-haspopup="true" aria-expanded="false"
              title="Apply a preset — replaces display, dither, tone & colour settings.">
        Apply preset <span class="caret">▾</span>
      </button>
      <div id="presetMenu" class="popover-menu hidden" role="menu" aria-label="Presets"></div>
    </div>

    <!-- Display size -->
    <label class="appbar-label">
      <span>Size</span>
      <select id="displayPreset"></select>
    </label>

    <!-- Portrait -->
    <label class="switch">
      <input type="checkbox" id="portrait">
      <span>Portrait</span>
    </label>

    <!-- Output mode -->
    <label class="appbar-label">
      <span>Output</span>
      <select id="outputMode" title="Pick the bit-depth and palette your target panel expects.">
        <option value="1bit">1-bit B&amp;W</option>
        <option value="4gray">4-gray</option>
        <option value="2bit-bw-red">B+W+Red</option>
        <option value="2bit-bw-yellow">B+W+Yellow</option>
        <option value="7color">7-color</option>
      </select>
    </label>
    <span class="palette-swatches" id="paletteSwatches"></span>
  </div>

  <div class="appbar-actions">
    <button id="undoBtn" class="iconbtn" title="Undo (Ctrl/Cmd-Z)" disabled>↶</button>
    <button id="redoBtn" class="iconbtn" title="Redo (Ctrl/Cmd-Shift-Z)" disabled>↷</button>
    <button id="download" class="primary" disabled>Export .bmp</button>
  </div>
</header>

<main class="workspace">

  <!-- LEFT RAIL: Layers -->
  <aside class="rail rail-left">
    <div class="rail-section">
      <div class="rail-head">
        <h2>Layers</h2>
        <span class="hint">drag to reorder</span>
      </div>
      <label id="drop" class="dropzone">
        <input type="file" id="file" accept="image/*" multiple hidden>
        <strong>+ Add images</strong>
        <span class="desktop-copy">Drop, paste, or click — pick multiple at once</span>
        <span class="mobile-copy">Tap to choose images</span>
      </label>
      <div id="layers"><div class="empty">No layers yet</div></div>
    </div>
  </aside>

  <!-- CENTER: Preview -->
  <section class="canvas-area">
    <div class="canvas-wrap">
      <canvas id="preview" width="800" height="480"></canvas>
    </div>
    <div class="statusbar">
      <span id="status" class="status">Waiting for images…</span>
      <span class="statusbar-trailing">
        <button id="peekBtn" type="button" class="iconbtn" title="Hold to compare un-dithered (Space)">Peek</button>
        <span class="hint shortcut-hints">Space peek · R rotate · Del remove · Ctrl-Z undo</span>
      </span>
    </div>
  </section>

  <!-- RIGHT RAIL: Inspector (single scroll, no tabs) -->
  <aside class="rail rail-right">
    <div class="rail-content">

      <!-- ---------- LAYER ---------- -->
      <div class="rail-group">
        <h2 class="group-title">Layer</h2>

        <div id="layerEmpty" class="empty-state">
          Select a layer in the list to edit it.
        </div>

        <div id="selHead" class="hidden"><h3>Transform</h3></div>
        <div class="section hidden" id="selControls">
          <label class="range">
            <span>Scale</span>
            <input type="range" id="scale" min="1" max="500" value="100">
            <input type="number" class="value" id="scaleVal" min="1" max="500" value="100">
            <span class="unit">%</span>
          </label>
        </div>
        <div class="section hidden" id="selControlsRot">
          <label class="range">
            <span>Rotation</span>
            <input type="range" id="rotation" min="-180" max="180" value="0" step="1">
            <input type="number" class="value" id="rotationVal" min="-180" max="180" value="0">
            <span class="unit">°</span>
          </label>
          <div class="row-actions">
            <button id="rotate90" title="Rotate 90° clockwise (R)">⟳ 90°</button>
            <button id="rotateReset" title="Reset rotation to 0°">Reset</button>
          </div>
        </div>
        <div class="section hidden" id="selControls2">
          <div class="row-actions">
            <button id="center">Center</button>
            <button id="fit">Fit canvas</button>
          </div>
        </div>

        <div id="bgHead" class="hidden"><h3>Background removal</h3></div>
        <div class="section hidden" id="bgControls">
          <label class="switch">
            <input type="checkbox" id="bgEnable">
            <span>Remove background</span>
          </label>
        </div>
        <div class="section hidden" id="bgControls2">
          <div class="row-actions">
            <button id="bgAuto" title="Re-sample from the 4 image corners">Auto</button>
            <button id="bgPick" title="Click a pixel on the preview to pick a color">Pick</button>
            <span id="bgSwatch" title="Current key colour"></span>
          </div>
        </div>
        <div class="section hidden" id="bgControls3">
          <label class="range">
            <span>Tolerance</span>
            <input type="range" id="bgTolerance" min="0" max="255" value="30">
            <input type="number" class="value" id="bgToleranceVal" min="0" max="255" value="30">
          </label>
          <label class="range">
            <span>Feather</span>
            <input type="range" id="bgFeather" min="0" max="200" value="20">
            <input type="number" class="value" id="bgFeatherVal" min="0" max="200" value="20">
          </label>
        </div>
      </div>

      <!-- ---------- IMAGE ---------- -->
      <div class="rail-group">
        <h2 class="group-title">Image</h2>

        <h3>Tone</h3>
        <label class="select-label">
          <span>Background</span>
          <select id="background">
            <option value="white" selected>White</option>
            <option value="black">Black</option>
          </select>
        </label>
        <label class="range">
          <span>Brightness</span>
          <input type="range" id="brightness" min="-100" max="100" value="0">
          <input type="number" class="value" id="brightnessVal" min="-100" max="100" value="0">
        </label>
        <label class="range">
          <span>Contrast</span>
          <input type="range" id="contrast" min="-100" max="100" value="0">
          <input type="number" class="value" id="contrastVal" min="-100" max="100" value="0">
        </label>
        <!-- Saturation only matters in colour modes — hidden in 1-bit. -->
        <label id="saturationLabel" class="range hidden" title="Boost colour intensity before quantisation. Waveshare guides recommend ~150–200% for 7-colour displays because they render pale.">
          <span>Saturation</span>
          <input type="range" id="saturation" min="0" max="300" value="100">
          <input type="number" class="value" id="saturationVal" min="0" max="300" value="100">
          <span class="unit">%</span>
        </label>
        <label class="switch">
          <input type="checkbox" id="invert">
          <span>Invert</span>
        </label>

        <h3>Dither</h3>
        <label class="select-label">
          <span>Algorithm</span>
          <select id="dither">
            <optgroup label="Error diffusion">
              <option value="fs" selected>Floyd-Steinberg</option>
              <option value="atkinson">Atkinson</option>
              <option value="jjn">Jarvis-Judice-Ninke</option>
              <option value="stucki">Stucki</option>
              <option value="burkes">Burkes</option>
              <option value="sierra">Sierra</option>
              <option value="sierraLite">Sierra Lite</option>
            </optgroup>
            <optgroup label="Ordered">
              <option value="bayer4">Bayer 4×4</option>
              <option value="bayer8">Bayer 8×8</option>
              <option value="blueNoise">Blue noise (IGN)</option>
            </optgroup>
            <optgroup label="Plain">
              <option value="none">None (nearest / threshold)</option>
            </optgroup>
          </select>
        </label>
        <label id="diffStrengthLabel" class="range">
          <span>Diffusion</span>
          <input type="range" id="fsStrength" min="0" max="100" value="100">
          <input type="number" class="value" id="fsStrengthVal" min="0" max="100" value="100">
          <span class="unit">%</span>
        </label>
        <label id="thresholdLabel" class="range hidden">
          <span>Threshold</span>
          <input type="range" id="threshold" min="0" max="255" value="128">
          <input type="number" class="value" id="thresholdVal" min="0" max="255" value="128">
        </label>

        <h3>Colour quality</h3>
        <label class="switch" title="Use OkLab (perceptually uniform) instead of RGB when picking the nearest palette colour. Big quality win on skin tones, foliage, skies.">
          <input type="checkbox" id="perceptual" checked>
          <span>Perceptual palette (OkLab)</span>
        </label>
        <label class="switch" title="Error-diffuse in linear-light space so dithered gradients stop looking washed-out. Slower but more accurate.">
          <input type="checkbox" id="gamma">
          <span>Gamma-correct diffusion</span>
        </label>

        <div class="row-actions sticky-bottom">
          <button id="resetGlobals" title="Reset tone & dither to defaults (keeps your display + profile choice).">Reset settings</button>
          <button id="clearAll" title="Remove every layer.">Clear layers</button>
        </div>
      </div>

    </div>
  </aside>

</main>

<!-- Order is dependency-driven. All scripts are classic + defer, so they
     execute in document order after parse and share the realm's global
     lexical environment — top-level let/const/function declarations from
     each file are visible to every later file with no import. -->
<script defer src="src/displays.js"></script>
<script defer src="src/palettes.js"></script>
<script defer src="src/color.js"></script>
<script defer src="src/dither.js"></script>
<script defer src="src/quantize.js"></script>
<script defer src="src/bmp.js"></script>
<script defer src="src/state.js"></script>
<script defer src="src/history.js"></script>
<script defer src="src/render.js"></script>
<script defer src="src/layers.js"></script>
<script defer src="src/ui-bindings.js"></script>
<script defer src="src/ui-appbar.js"></script>
<script defer src="src/ui-inspector.js"></script>
<script defer src="src/ui-canvas.js"></script>
<script defer src="src/ui-files.js"></script>
<script defer src="src/ui-keyboard.js"></script>
<script defer src="src/main.js"></script>

</body>
</html>
